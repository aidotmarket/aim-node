openapi: "3.1.0"
info:
  title: AIM Node Facade API
  version: "0.1.0"
  description: >
    aim-node management API facade endpoints. The browser UI calls these routes under
    /api/mgmt/marketplace/* and the node proxies the request to ai-market-backend using
    node-owned marketplace credentials. Mutating requests require X-CSRF-Token from
    GET /api/mgmt/health; remote-bind deployments also require the session token enforced
    by the management middleware.
components:
  securitySchemes:
    csrf:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Issued via GET /api/mgmt/health response header.
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - setup_incomplete
            - node_locked
            - auth_failed
            - csrf_rejected
            - forbidden
            - not_found
            - already_exists
            - already_running
            - not_running
            - config_invalid
            - tool_validation_failed
            - upstream_unreachable
            - market_unreachable
            - market_error
            - upstream_timeout
            - market_timeout
            - service_unavailable
            - rate_limited
            - internal_error
        message:
          type: string
        details:
          type:
            - object
            - "null"
          additionalProperties: true
        retryable:
          type:
            - boolean
            - "null"
        request_id:
          type:
            - string
            - "null"
        suggested_action:
          type:
            - string
            - "null"
    NodeRecord:
      type: object
      required:
        - node_id
        - public_key
        - endpoint_url
        - status
      properties:
        node_id:
          type: string
        node_serial:
          type:
            - string
            - "null"
        public_key:
          type: string
        endpoint_url:
          type: string
          format: uri
        status:
          type: string
          enum:
            - active
            - inactive
            - pending
            - disabled
        seller_id:
          type:
            - string
            - "null"
        registered_at:
          type:
            - string
            - "null"
          format: date-time
    NodeResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeRecord"
        node:
          $ref: "#/components/schemas/NodeRecord"
    ToolMetadata:
      type: object
      required:
        - tool_name
        - version
      properties:
        tool_name:
          type: string
        display_name:
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
        version:
          type: string
        visibility:
          type: string
          enum:
            - public
            - private
            - unlisted
        price_per_call_cents:
          type:
            - integer
            - "null"
          minimum: 0
        pricing_model:
          type:
            - string
            - "null"
          enum:
            - flat
            - metered
            - subscription
        tags:
          type: array
          items:
            type: string
        input_schema:
          type:
            - object
            - "null"
          additionalProperties: true
        output_schema:
          type:
            - object
            - "null"
          additionalProperties: true
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
    PublishedTool:
      allOf:
        - $ref: "#/components/schemas/ToolMetadata"
        - type: object
          required:
            - tool_id
            - status
          properties:
            tool_id:
              type: string
            status:
              type: string
              enum:
                - draft
                - active
                - archived
            listing_id:
              type:
                - string
                - "null"
            listing_url:
              type:
                - string
                - "null"
              format: uri
            created_at:
              type:
                - string
                - "null"
              format: date-time
            updated_at:
              type:
                - string
                - "null"
              format: date-time
    ToolListResponse:
      type: object
      required:
        - tools
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/PublishedTool"
    ToolMutationResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        tool:
          $ref: "#/components/schemas/PublishedTool"
    DeleteResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        archived:
          type:
            - boolean
            - "null"
        tool_id:
          type:
            - string
            - "null"
    EarningsBucket:
      type: object
      required:
        - bucket
        - gross_amount_usd
        - net_amount_usd
      properties:
        bucket:
          type: string
        tool_id:
          type:
            - string
            - "null"
        session_count:
          type:
            - integer
            - "null"
        gross_amount_usd:
          type: number
        net_amount_usd:
          type: number
        fees_usd:
          type:
            - number
            - "null"
    PayoutSummaryResponse:
      type: object
      required:
        - node_id
        - range
        - buckets
      properties:
        node_id:
          type: string
        range:
          type: string
        group_by:
          type:
            - string
            - "null"
        currency:
          type:
            - string
            - "null"
        total_gross_usd:
          type:
            - number
            - "null"
        total_net_usd:
          type:
            - number
            - "null"
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/EarningsBucket"
    PayoutRecord:
      type: object
      required:
        - payout_id
        - status
        - amount_usd
        - created_at
      properties:
        payout_id:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
        amount_usd:
          type: number
        currency:
          type:
            - string
            - "null"
        period_start:
          type:
            - string
            - "null"
          format: date-time
        period_end:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
        paid_at:
          type:
            - string
            - "null"
          format: date-time
    PayoutHistoryResponse:
      type: object
      required:
        - payouts
      properties:
        payouts:
          type: array
          items:
            $ref: "#/components/schemas/PayoutRecord"
    MarketplaceSession:
      type: object
      required:
        - session_id
        - tool_id
        - status
        - started_at
      properties:
        session_id:
          type: string
        tool_id:
          type: string
        listing_id:
          type:
            - string
            - "null"
        buyer_node_id:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - pending
            - active
            - completed
            - failed
            - cancelled
        request_count:
          type:
            - integer
            - "null"
        gross_amount_usd:
          type:
            - number
            - "null"
        started_at:
          type: string
          format: date-time
        ended_at:
          type:
            - string
            - "null"
          format: date-time
    SessionHistoryResponse:
      type: object
      required:
        - sessions
      properties:
        node_id:
          type:
            - string
            - "null"
        range:
          type:
            - string
            - "null"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/MarketplaceSession"
    SettlementRecord:
      type: object
      required:
        - settlement_id
        - session_id
        - amount_usd
        - status
        - settled_at
      properties:
        settlement_id:
          type: string
        session_id:
          type: string
        amount_usd:
          type: number
        fees_usd:
          type:
            - number
            - "null"
        status:
          type: string
          enum:
            - pending
            - settled
            - reversed
        settled_at:
          type: string
          format: date-time
    SettlementsResponse:
      type: object
      required:
        - settlements
      properties:
        node_id:
          type:
            - string
            - "null"
        range:
          type:
            - string
            - "null"
        settlements:
          type: array
          items:
            $ref: "#/components/schemas/SettlementRecord"
    TrustFactor:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
        value:
          type: number
        weight:
          type:
            - number
            - "null"
    TrustResponse:
      type: object
      required:
        - node_id
        - score
      properties:
        node_id:
          type: string
        score:
          type: number
        tier:
          type:
            - string
            - "null"
        updated_at:
          type:
            - string
            - "null"
          format: date-time
        factors:
          type: array
          items:
            $ref: "#/components/schemas/TrustFactor"
    TrustEvent:
      type: object
      required:
        - event_id
        - event_type
        - created_at
      properties:
        event_id:
          type: string
        event_type:
          type: string
        delta:
          type:
            - number
            - "null"
        description:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
    TrustEventsResponse:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/TrustEvent"
    TraceSummary:
      type: object
      required:
        - trace_id
        - status
        - started_at
      properties:
        trace_id:
          type: string
        session_id:
          type:
            - string
            - "null"
        tool_id:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - started
            - completed
            - failed
            - timed_out
        latency_ms:
          type:
            - number
            - "null"
        started_at:
          type: string
          format: date-time
        finished_at:
          type:
            - string
            - "null"
          format: date-time
    TracesResponse:
      type: object
      required:
        - traces
      properties:
        traces:
          type: array
          items:
            $ref: "#/components/schemas/TraceSummary"
    ListingRecord:
      type: object
      required:
        - listing_id
        - tool_id
        - status
      properties:
        listing_id:
          type: string
        tool_id:
          type: string
        title:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - draft
            - active
            - archived
        price_per_call_cents:
          type:
            - integer
            - "null"
          minimum: 0
        marketplace_url:
          type:
            - string
            - "null"
          format: uri
        created_at:
          type:
            - string
            - "null"
          format: date-time
    ListingsResponse:
      type: object
      required:
        - listings
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/ListingRecord"
    DiscoverRequest:
      type: object
      properties:
        query:
          type:
            - string
            - "null"
        category:
          type:
            - string
            - "null"
        tags:
          type: array
          items:
            type: string
        limit:
          type:
            - integer
            - "null"
          minimum: 1
          maximum: 100
        price_max_usd:
          type:
            - number
            - "null"
        capability_filters:
          type:
            - object
            - "null"
          additionalProperties: true
    DiscoverResult:
      type: object
      required:
        - listing_id
        - tool_name
        - status
      properties:
        listing_id:
          type: string
        tool_id:
          type:
            - string
            - "null"
        tool_name:
          type: string
        node_id:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - active
            - inactive
            - archived
        latency_ms:
          type:
            - number
            - "null"
        price_per_call_cents:
          type:
            - integer
            - "null"
          minimum: 0
        summary:
          type:
            - string
            - "null"
    DiscoverResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/DiscoverResult"
        total:
          type:
            - integer
            - "null"
  responses:
    SetupIncomplete:
      description: Node configuration is incomplete and the marketplace facade is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: setup_incomplete
            message: Node not yet configured
    MarketError:
      description: Backend returned a non-2xx response that was normalized by the facade.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: market_error
            message: Marketplace returned an error
            details:
              status: 502
              backend_error: upstream bad gateway
              endpoint: /aim/payouts/summary
            suggested_action: Check your API key in Settings
    MarketUnreachable:
      description: ai-market-backend could not be reached.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: market_unreachable
            message: Cannot reach marketplace
            retryable: true
    MarketTimeout:
      description: ai-market-backend did not respond before the facade timeout.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: market_timeout
            message: Marketplace request timed out
            retryable: true
    CsrfRejected:
      description: CSRF token was missing or invalid for a mutating management request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: csrf_rejected
            message: Missing or invalid CSRF token
            suggested_action: Include X-CSRF-Token header from GET /api/mgmt/health
paths:
  /api/mgmt/marketplace/node:
    get:
      summary: Get the seller node registration known to the backend
      description: Proxies GET /aim/nodes/mine on ai-market-backend and returns the authenticated seller's node records.
      responses:
        "200":
          description: Authenticated seller node registrations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/tools:
    get:
      summary: List published tools for the configured node
      description: Proxies GET /aim/nodes/{id}/tools. Response may be cached for 30 seconds by the facade.
      responses:
        "200":
          description: Published tool records for this node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/tools/publish:
    post:
      summary: Publish a local tool to the marketplace
      description: Proxies POST /aim/nodes/{id}/tools/publish and invalidates the cached published-tool list.
      security:
        - csrf: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolMetadata"
      responses:
        "200":
          description: Tool published or updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolMutationResponse"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/tools/{tool_id}:
    put:
      summary: Update marketplace metadata for a published tool
      description: Proxies PUT /aim/nodes/{id}/tools/{tool_id} and invalidates the cached published-tool list.
      security:
        - csrf: []
      parameters:
        - name: tool_id
          in: path
          required: true
          schema:
            type: string
          description: Backend tool identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolMetadata"
      responses:
        "200":
          description: Tool metadata was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolMutationResponse"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
    delete:
      summary: Archive a published tool
      description: Proxies DELETE /aim/nodes/{id}/tools/{tool_id} and invalidates the cached published-tool list.
      security:
        - csrf: []
      parameters:
        - name: tool_id
          in: path
          required: true
          schema:
            type: string
          description: Backend tool identifier.
      responses:
        "200":
          description: Tool archived successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/earnings:
    get:
      summary: Get earnings rollups for the configured node
      description: Proxies GET /aim/payouts/summary with node_id and range query parameters. Response may be cached for 60 seconds.
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            default: 7d
          description: Relative window such as 24h, 7d, or 30d.
      responses:
        "200":
          description: Earnings summary for the requested window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutSummaryResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/earnings/history:
    get:
      summary: Get payout history
      description: Proxies GET /aim/payouts/history. Response may be cached for 60 seconds.
      responses:
        "200":
          description: Historical payout records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutHistoryResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/sessions:
    get:
      summary: Get marketplace session history
      description: Proxies GET /aim/sessions with node_id and range. This is not cached because the view is real-time.
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            default: 7d
          description: Relative window such as 24h, 7d, or 30d.
      responses:
        "200":
          description: Marketplace session history for this node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionHistoryResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/settlements:
    get:
      summary: Get settlement records for the configured node
      description: Proxies GET /aim/settlements with node_id and range. Response may be cached for 60 seconds.
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            default: 30d
          description: Relative window such as 7d, 30d, or 90d.
      responses:
        "200":
          description: Settlement records for the requested window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementsResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/trust:
    get:
      summary: Get trust score data for the configured node
      description: Proxies GET /aim/nodes/{id}/trust. Response may be cached for 300 seconds.
      responses:
        "200":
          description: Current trust score and factor breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/trust/events:
    get:
      summary: Get trust event history for the configured node
      description: Proxies GET /aim/nodes/{id}/trust/events. Response may be cached for 300 seconds.
      responses:
        "200":
          description: Trust event history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustEventsResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/traces:
    get:
      summary: Get recent observability traces for the configured node
      description: Proxies GET /aim/observability/traces with node_id and limit. This is not cached because the feed is real-time.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
          description: Maximum number of recent trace summaries to return.
      responses:
        "200":
          description: Recent trace summaries for this node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracesResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/listings:
    get:
      summary: Get listings originated by the configured node
      description: Proxies GET /listings with the configured node_id filter. Response may be cached for 30 seconds.
      responses:
        "200":
          description: Marketplace listings tied to this node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
  /api/mgmt/marketplace/discover:
    post:
      summary: Search marketplace listings
      description: Proxies POST /aim/discover/search. Used by buyer-mode UI flows and not cached.
      security:
        - csrf: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverRequest"
      responses:
        "200":
          description: Marketplace search results matching the supplied filters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "412":
          $ref: "#/components/responses/SetupIncomplete"
        "502":
          $ref: "#/components/responses/MarketError"
        "504":
          $ref: "#/components/responses/MarketTimeout"
