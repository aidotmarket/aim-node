name: Smoke Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[test]"

      - name: Verify test secret
        run: |
          if [ -z "$AIM_TEST_AUTH_TOKEN" ]; then
            echo "::error::AIM_TEST_AUTH_TOKEN secret is not set"
            exit 1
          fi
        env:
          AIM_TEST_AUTH_TOKEN: ${{ secrets.AIM_TEST_AUTH_TOKEN }}

      - name: Verify required secrets
        run: |
          if [ -z "$AIM_TEST_EMAIL" ]; then
            echo "::error::AIM_TEST_EMAIL secret is not configured. Smoke tests cannot run."
            exit 1
          fi
        env:
          AIM_TEST_EMAIL: ${{ secrets.AIM_TEST_EMAIL }}

      - name: Run smoke tests
        env:
          AIM_TEST_EMAIL: ${{ secrets.AIM_TEST_EMAIL }}
          AIM_TEST_AUTH_TOKEN: ${{ secrets.AIM_TEST_AUTH_TOKEN }}
        run: |
          pytest tests/smoke/ -v --tb=short
