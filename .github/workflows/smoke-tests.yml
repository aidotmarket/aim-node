name: Smoke Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade -e ".[test]"

      - name: Verify pytest-asyncio version
        run: |
          version=$(python -m pip show pytest-asyncio | grep Version | cut -d' ' -f2)
          echo "pytest-asyncio version: $version"
          major=$(echo $version | cut -d. -f1)
          minor=$(echo $version | cut -d. -f2)
          if [ "$major" -eq 0 ] && [ "$minor" -lt 23 ]; then
            echo "::error::pytest-asyncio < 0.23, upgrading..."
            pip install --upgrade "pytest-asyncio>=0.23"
          fi
        env:
          AIM_TEST_AUTH_TOKEN: ${{ secrets.AIM_TEST_AUTH_TOKEN }}

      - name: Verify test secrets
        run: |
          missing=""
          [ -z "$AIM_TEST_AUTH_TOKEN" ] && missing="$missing AIM_TEST_AUTH_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            exit 1
          fi
        env:
          AIM_TEST_AUTH_TOKEN: ${{ secrets.AIM_TEST_AUTH_TOKEN }}

      - name: Verify required secrets
        run: |
          if [ -z "$AIM_TEST_EMAIL" ]; then
            echo "::error::AIM_TEST_EMAIL secret is not configured. Smoke tests cannot run."
            exit 1
          fi
        env:
          AIM_TEST_EMAIL: ${{ secrets.AIM_TEST_EMAIL }}

      - name: Run smoke tests
        env:
          AIM_TEST_EMAIL: ${{ secrets.AIM_TEST_EMAIL }}
          AIM_TEST_AUTH_TOKEN: ${{ secrets.AIM_TEST_AUTH_TOKEN }}
        run: |
          pytest tests/smoke/ -v --tb=short
