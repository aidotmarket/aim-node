name: Smoke Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[test]"

      - name: Run smoke tests
        env:
          AIM_TEST_API_KEY: ${{ secrets.AIM_TEST_API_KEY }}
          AIM_TEST_EMAIL: ${{ secrets.AIM_TEST_EMAIL }}
        run: |
          pytest tests/smoke/ -v --tb=short
